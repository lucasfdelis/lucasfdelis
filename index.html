<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lucas Alves — Resume</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #f0f2f5; font-family: 'Segoe UI', system-ui, sans-serif; }
        .selector {
            position: sticky;
            top: 0;
            z-index: 10;
            background: #1B2A4A;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 4px;
            padding: 10px;
            flex-wrap: wrap;
        }
        .selector button {
            padding: 7px 24px;
            border: 1px solid rgba(255,255,255,0.25);
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            background: transparent;
            color: #94A3B8;
        }
        .selector button.active {
            background: #fff;
            color: #1B2A4A;
            border-color: #fff;
        }
        .selector button:hover:not(.active) {
            background: rgba(255,255,255,0.1);
            color: #fff;
        }
        .selector .action {
            color: #fff;
            border-color: rgba(255,255,255,0.4);
        }
        .selector .action:hover {
            background: #2563EB;
            border-color: #2563EB;
            color: #fff;
        }
        .divider {
            width: 1px;
            height: 24px;
            background: rgba(255,255,255,0.2);
            margin: 0 6px;
        }
        .resume-frame {
            max-width: 210mm;
            margin: 24px auto;
            background: #fff;
            box-shadow: 0 2px 16px rgba(0,0,0,0.1);
            border-radius: 4px;
            overflow: hidden;
        }
        .resume-frame iframe {
            width: 100%;
            height: 297mm;
            border: none;
            display: block;
        }
        .resume-frame iframe.hidden { display: none; }
        @media (max-width: 800px) {
            .resume-frame { margin: 12px; border-radius: 4px; }
            .resume-frame iframe { height: 85vh; }
        }
    </style>
</head>
<body>
    <div class="selector">
        <button class="active" onclick="switchLang('en', this)">English</button>
        <button onclick="switchLang('pt', this)">Português</button>
        <span class="divider"></span>
        <button class="action" onclick="printCV()">🖨️ Imprimir / PDF</button>
        <button class="action" onclick="downloadCV()">⬇️ Download</button>
    </div>
    <div class="resume-frame">
        <iframe id="frame-en" src="resume_en.html"></iframe>
        <iframe id="frame-pt" src="resume_pt.html" class="hidden"></iframe>
    </div>
    <script>
    var currentLang = 'en';
    var files = { en: 'resume_en.html', pt: 'resume_pt.html' };

    function switchLang(lang, btn) {
        currentLang = lang;
        document.querySelectorAll('.selector button:not(.action)').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('frame-en').classList.toggle('hidden', lang !== 'en');
        document.getElementById('frame-pt').classList.toggle('hidden', lang !== 'pt');
    }

    // Open the visible CV in its own tab and print it there,
    // so only the resume prints (no selector bar, no second language).
    function printCV() {
        var win = window.open(files[currentLang], '_blank');
        if (!win) {
            alert('Permita pop-ups para imprimir o currículo.');
            return;
        }
        win.addEventListener('load', function () {
            win.focus();
            win.print();
        });
    }

    function downloadCV() {
        var a = document.createElement('a');
        a.href = files[currentLang];
        a.download = files[currentLang];
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
    }

    // If someone hits Ctrl+P on this page, redirect to the clean print instead.
    window.addEventListener('beforeprint', function (e) {});
    document.addEventListener('keydown', function (e) {
        if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'p') {
            e.preventDefault();
            printCV();
        }
    });
    </script>
</body>
</html>
